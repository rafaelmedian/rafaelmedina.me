<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="2; url=/" />
    <title>Redirecting - Rafael Medina</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f7f7f6;
        color: #171717;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        display: grid;
        justify-items: center;
        gap: 18px;
        text-align: center;
      }

      .mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #ffffff;
        box-shadow:
          0 1px 1px rgb(0 0 0 / 0.05),
          0 18px 42px -28px rgb(0 0 0 / 0.35);
        color: #6f6f6f;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 5vw, 36px);
        font-weight: 500;
        line-height: 1.08;
        letter-spacing: 0;
        text-wrap: balance;
      }

      p {
        max-width: 30ch;
        margin: 0;
        color: #777777;
        font-size: 16px;
        line-height: 1.5;
        text-wrap: pretty;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #171717;
        padding: 0 18px;
        color: #ffffff;
        font-size: 14px;
        line-height: 1;
        text-decoration: none;
        transition:
          transform 160ms cubic-bezier(0.2, 0, 0, 1),
          background-color 160ms ease-out;
      }

      a:hover,
      a:focus-visible {
        background: #2d2d2d;
      }

      a:active {
        transform: scale(0.96);
      }

      @media (prefers-reduced-motion: reduce) {
        a {
          transition: none;
        }
      }
    </style>
    <script>
      window.setTimeout(function () {
        window.location.replace("/")
      }, 1200)
    </script>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">404</div>
      <h1>Heading back home.</h1>
      <p>This page moved, or maybe it never existed. Redirecting you to the main page.</p>
      <a href="/">Go home now</a>
    </main>
  </body>
</html>
